default_language_version:
    python: python3
exclude: ^examples/
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
    -   id: check-added-large-files
    -   id: check-toml
    -   id: check-yaml
        args:
        -   --unsafe
    -   id: end-of-file-fixer
    -   id: trailing-whitespace
        exclude: .bumpversion.cfg
-   repo: https://github.com/PyCQA/autoflake
    rev: v2.2.1
    hooks:
    -   id: autoflake
        args:
        - --recursive
        - --in-place
        - --remove-all-unused-imports
        - --remove-unused-variables
        - --expand-star-imports
        - --exclude
        - __init__.py
        - --remove-duplicate-keys
-   repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
    -   id: isort
        args: ["--profile", "black"]
-   repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
    -   id: black
-   repo: local
    hooks:
    -   id: skipnet-legacy-read-guard
        name: skipnet legacy read guard
        entry: bash -c "if rg 'y_hat_global|y_hat_local' spherical_deepkriging/ | grep -v 'spherical_deepkriging/models/skipnet.py' | grep -v 'tests/test_skipnet.py'; then echo 'Found legacy y_hat_* usage outside allowlist'; exit 1; fi"
        language: system
        pass_filenames: false
